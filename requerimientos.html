<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Requerimientos — Estudio Contable</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --ink-light: #3d3d5c;
    --ink-muted: #8888a8;
    --paper: #f5f3ee;
    --paper-warm: #ede9e0;
    --accent: #c8472a;
    --accent-light: #e8654a;
    --gold: #c9a84c;
    --green: #2d7a4f;
    --col1: #4a6fa5;
    --col2: #e8924a;
    --col3: #9b6bb5;
    --col4: #2d7a8a;
    --col5: #4a9b5f;
    --shadow: 0 2px 12px rgba(26,26,46,0.08);
    --shadow-lg: 0 8px 32px rgba(26,26,46,0.14);
    --radius: 8px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1a2e' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--ink);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    color: white; font-size: 18px; font-weight: bold;
    letter-spacing: -1px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 1.15rem;
    line-height: 1.1;
  }

  .logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    color: var(--ink-muted);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex; align-items: center; gap: 12px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 16px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.14); color: white; }

  /* ── TOOLBAR ── */
  .toolbar {
    position: relative; z-index: 10;
    padding: 1rem 2rem;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--paper-warm);
    border-bottom: 1px solid rgba(26,26,46,0.08);
  }

  .toolbar-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-right: 4px;
  }

  .filter-group {
    display: flex; gap: 4px; background: rgba(26,26,46,0.06); padding: 3px; border-radius: 8px;
  }

  .filter-btn {
    background: none; border: none;
    padding: 5px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .filter-btn.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .date-nav {
    display: flex; align-items: center; gap: 6px;
  }

  .date-nav button {
    background: none; border: 1px solid rgba(26,26,46,0.15);
    width: 28px; height: 28px; border-radius: 6px;
    cursor: pointer; font-size: 0.9rem; color: var(--ink-light);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .date-nav button:hover { background: white; color: var(--ink); }

  .date-display {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    min-width: 170px;
    text-align: center;
  }

  .search-box {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    background: white;
    border: 1px solid rgba(26,26,46,0.12);
    border-radius: var(--radius);
    padding: 6px 12px;
  }
  .search-box input {
    border: none; outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    color: var(--ink);
    background: none;
    width: 200px;
  }
  .search-box input::placeholder { color: var(--ink-muted); }

  .stats-bar {
    position: relative; z-index: 10;
    padding: 0.6rem 2rem;
    display: flex; gap: 2rem;
    border-bottom: 1px solid rgba(26,26,46,0.06);
  }

  .stat-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem;
  }
  .stat-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .stat-num {
    font-weight: 600;
    font-size: 0.95rem;
  }
  .stat-label { color: var(--ink-muted); }

  /* ── KANBAN BOARD ── */
  .board-container {
    position: relative; z-index: 1;
    padding: 1.5rem 2rem 3rem;
    overflow-x: auto;
  }

  .board {
    display: flex; gap: 1rem;
    min-width: max-content;
    align-items: flex-start;
  }

  .column {
    width: 300px;
    flex-shrink: 0;
    display: flex; flex-direction: column; gap: 0;
  }

  .col-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    color: white;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.02em;
  }

  .col-badge {
    background: rgba(255,255,255,0.22);
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
  }

  .col-body {
    background: rgba(26,26,46,0.04);
    border: 1px solid rgba(26,26,46,0.08);
    border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    padding: 10px;
    min-height: 200px;
    display: flex; flex-direction: column; gap: 8px;
  }

  .col-0 .col-header { background: var(--col1); }
  .col-1 .col-header { background: var(--col2); }
  .col-2 .col-header { background: var(--col3); }
  .col-3 .col-header { background: var(--col4); }
  .col-4 .col-header { background: var(--col5); }

  /* ── CARD ── */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
    position: relative;
    animation: cardIn 0.25s ease;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .card.overdue { border-left-color: var(--accent); }
  .card.due-soon { border-left-color: var(--gold); }

  .card-org {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 8px;
  }

  .card-client {
    font-size: 0.78rem;
    color: var(--ink-light);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 4px;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }

  .card-date {
    font-size: 0.73rem;
    display: flex; align-items: center; gap: 4px;
    color: var(--ink-muted);
  }
  .card-date.overdue { color: var(--accent); font-weight: 600; }
  .card-date.due-soon { color: #b8891a; font-weight: 600; }

  .card-avatar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink);
    color: white;
    font-size: 0.6rem;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .card-exp {
    font-size: 0.68rem;
    color: var(--ink-muted);
    font-style: italic;
    margin-top: 4px;
  }

  .card-actions {
    position: absolute; top: 8px; right: 8px;
    display: none; gap: 4px;
  }
  .card:hover .card-actions { display: flex; }

  .card-btn {
    background: var(--paper-warm);
    border: none;
    width: 22px; height: 22px; border-radius: 4px;
    cursor: pointer; font-size: 0.7rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .card-btn:hover { background: var(--paper); }
  .card-btn.danger:hover { background: #fde8e4; }

  .empty-col {
    text-align: center;
    padding: 24px 12px;
    color: var(--ink-muted);
    font-size: 0.78rem;
    font-style: italic;
  }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(26,26,46,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--paper);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    background: var(--ink);
    padding: 20px 24px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    display: flex; align-items: center; justify-content: space-between;
  }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 1.15rem;
  }

  .modal-close {
    background: rgba(255,255,255,0.1); border: none;
    width: 30px; height: 30px; border-radius: 6px;
    color: white; font-size: 1rem; cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.18); }

  .modal-body {
    padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .field-group {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .field-group.full { grid-template-columns: 1fr; }

  .field {
    display: flex; flex-direction: column; gap: 5px;
  }

  label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  input, select, textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: white;
    border: 1px solid rgba(26,26,46,0.15);
    border-radius: var(--radius);
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--col1);
    box-shadow: 0 0 0 3px rgba(74,111,165,0.1);
  }
  textarea { resize: vertical; min-height: 80px; }

  .modal-footer {
    padding: 16px 24px;
    display: flex; justify-content: flex-end; gap: 10px;
    border-top: 1px solid rgba(26,26,46,0.08);
  }

  .btn-cancel {
    background: none;
    border: 1px solid rgba(26,26,46,0.15);
    padding: 8px 18px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--ink-light);
    transition: all 0.15s;
  }
  .btn-cancel:hover { background: var(--paper-warm); }

  .btn-save {
    background: var(--accent);
    color: white; border: none;
    padding: 8px 22px;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-save:hover { background: var(--accent-light); }

  /* Stage move buttons in detail modal */
  .stage-nav {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px;
  }
  .stage-btn {
    padding: 5px 12px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 500;
    border: 1.5px solid;
    cursor: pointer; transition: all 0.15s;
    background: none;
  }
  .stage-btn.current { color: white !important; border-color: transparent !important; }

  /* Toast */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 2000;
    background: var(--ink);
    color: white;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 0.83rem;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(26,26,46,0.2); border-radius: 3px; }

  @media (max-width: 768px) {
    .toolbar { padding: 0.75rem 1rem; }
    .board-container { padding: 1rem; }
    header { padding: 0 1rem; }
    .logo-text { display: none; }
    .search-box { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">R</div>
    <div>
      <div class="logo-text">Tablero de Requerimientos</div>
      <div class="logo-sub">Estudio Contable</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-secondary" onclick="exportData()">↓ Exportar</button>
    <button class="btn-primary" onclick="openNewModal()">+ Nuevo Requerimiento</button>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="toolbar-label">Vista</span>
  <div class="filter-group">
    <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('mes', this)">Mes</button>
    <button class="filter-btn" onclick="setFilter('semana', this)">Semana</button>
    <button class="filter-btn" onclick="setFilter('dia', this)">Día</button>
  </div>

  <div class="date-nav">
    <button onclick="navDate(-1)">‹</button>
    <span class="date-display" id="dateDisplay">—</span>
    <button onclick="navDate(1)">›</button>
  </div>

  <div class="search-box">
    <span style="color:var(--ink-muted);font-size:0.85rem">🔍</span>
    <input type="text" placeholder="Buscar cliente, organismo, expediente..." id="searchInput" oninput="renderBoard()">
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar"></div>

<!-- BOARD -->
<div class="board-container">
  <div class="board" id="board"></div>
</div>

<!-- MODAL: NUEVO / EDITAR -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitleText">Nuevo Requerimiento</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="field-group">
        <div class="field">
          <label>Organismo *</label>
          <select id="f_org">
            <option value="">Seleccionar...</option>
            <option>AFIP</option>
            <option>ARBA</option>
            <option>AGIP</option>
            <option>COMARB</option>
            <option>Municipalidad</option>
            <option>Ministerio de Trabajo</option>
            <option>ANSES</option>
            <option>Aduana</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="field">
          <label>Organismo personalizado</label>
          <input type="text" id="f_org_custom" placeholder="Si elegiste 'Otro'">
        </div>
      </div>
      <div class="field-group full">
        <div class="field">
          <label>Descripción del requerimiento *</label>
          <textarea id="f_desc" placeholder="Ej: Fiscalización IVA períodos 2022-2023, intimación por diferencias..."></textarea>
        </div>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Cliente *</label>
          <input type="text" id="f_client" placeholder="Nombre o CUIT">
        </div>
        <div class="field">
          <label>N° Expediente / Notificación</label>
          <input type="text" id="f_exp" placeholder="Ej: 1234/2025">
        </div>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Fecha de recepción *</label>
          <input type="date" id="f_received">
        </div>
        <div class="field">
          <label>Fecha límite de respuesta *</label>
          <input type="date" id="f_deadline">
        </div>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Responsable asignado</label>
          <input type="text" id="f_responsible" placeholder="Nombre del colaborador">
        </div>
        <div class="field">
          <label>Estado</label>
          <select id="f_stage">
            <option value="0">Recibido</option>
            <option value="1">En análisis</option>
            <option value="2">Documentación en preparación</option>
            <option value="3">Presentado</option>
            <option value="4">Cerrado</option>
          </select>
        </div>
      </div>
      <div class="field-group full">
        <div class="field">
          <label>Notas / Observaciones</label>
          <textarea id="f_notes" placeholder="Información adicional, documentos solicitados, contacto en el organismo..."></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveRequirement()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONNECTION STATUS -->
<div id="connStatus" style="position:fixed;bottom:1rem;left:1rem;z-index:999;font-size:0.75rem;padding:5px 12px;border-radius:20px;background:rgba(26,26,46,0.08);color:var(--ink-muted);transition:all 0.3s;">⏳ Conectando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIK4CIKUUDFwV1LOvuTaWHtmX6hwcHFCg",
  authDomain: "estudio-att.firebaseapp.com",
  projectId: "estudio-att",
  storageBucket: "estudio-att.firebasestorage.app",
  messagingSenderId: "258569631642",
  appId: "1:258569631642:web:3719ffdd874924f62e6c23"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const colRef = collection(db, "requerimientos");

// ── STATE ──
const STAGES = ['Recibido', 'En análisis', 'Doc. en preparación', 'Presentado', 'Cerrado'];
const STAGE_COLORS = ['var(--col1)','var(--col2)','var(--col3)','var(--col4)','var(--col5)'];

let requirements = [];
let currentFilter = 'todos';
let currentDate = new Date();
let editingId = null;

// ── FIRESTORE LISTENER (tiempo real) ──
onSnapshot(colRef, (snapshot) => {
  requirements = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderBoard();
  const el = document.getElementById('connStatus');
  el.textContent = '🟢 Sincronizado';
  el.style.background = 'rgba(45,122,79,0.1)';
  el.style.color = 'var(--green)';
}, (error) => {
  const el = document.getElementById('connStatus');
  el.textContent = '🔴 Sin conexión';
  el.style.color = 'var(--accent)';
});

// ── DATE HELPERS ──
function today() { return new Date(); }
function toISO(d) { return d.toISOString().split('T')[0]; }
function parseDate(s) { return s ? new Date(s + 'T00:00:00') : null; }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function weekOf(d) {
  const s = new Date(d); s.setDate(d.getDate() - d.getDay() + (d.getDay()===0?-6:1));
  const e = new Date(s); e.setDate(s.getDate()+6);
  return [s, e];
}
function monthOf(d) {
  return [new Date(d.getFullYear(), d.getMonth(), 1), new Date(d.getFullYear(), d.getMonth()+1, 0)];
}
function formatDate(s) {
  if (!s) return '—';
  const d = parseDate(s);
  return d.toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function dateStatus(deadline) {
  if (!deadline) return '';
  const t = today(); t.setHours(0,0,0,0);
  const d = parseDate(deadline);
  const diff = Math.ceil((d - t) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 5) return 'due-soon';
  return '';
}

// ── FILTER ──
function inRange(req) {
  if (currentFilter === 'todos') return true;
  const deadline = parseDate(req.deadline);
  if (!deadline) return false;
  if (currentFilter === 'dia') return sameDay(deadline, currentDate);
  if (currentFilter === 'semana') {
    const [s,e] = weekOf(currentDate);
    return deadline >= s && deadline <= e;
  }
  if (currentFilter === 'mes') {
    const [s,e] = monthOf(currentDate);
    return deadline >= s && deadline <= e;
  }
  return true;
}

function updateDateDisplay() {
  const el = document.getElementById('dateDisplay');
  if (currentFilter === 'todos') { el.textContent = 'Todos los registros'; return; }
  if (currentFilter === 'dia') {
    el.textContent = currentDate.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
  } else if (currentFilter === 'semana') {
    const [s,e] = weekOf(currentDate);
    el.textContent = `${s.toLocaleDateString('es-AR',{day:'numeric',month:'short'})} – ${e.toLocaleDateString('es-AR',{day:'numeric',month:'short',year:'numeric'})}`;
  } else if (currentFilter === 'mes') {
    el.textContent = currentDate.toLocaleDateString('es-AR', {month:'long', year:'numeric'});
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateDateDisplay();
  renderBoard();
}

function navDate(dir) {
  if (currentFilter === 'dia') currentDate.setDate(currentDate.getDate() + dir);
  else if (currentFilter === 'semana') currentDate.setDate(currentDate.getDate() + dir*7);
  else if (currentFilter === 'mes') currentDate.setMonth(currentDate.getMonth() + dir);
  updateDateDisplay();
  renderBoard();
}

// ── RENDER ──
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return requirements.filter(r => {
    const matchRange = inRange(r);
    const matchSearch = !q || [r.client, r.org, r.exp, r.desc].some(v => v && v.toLowerCase().includes(q));
    return matchRange && matchSearch;
  });
}

function renderStats(filtered) {
  const bar = document.getElementById('statsBar');
  const overdue = filtered.filter(r => dateStatus(r.deadline) === 'overdue' && r.stage < 4).length;
  const dueSoon = filtered.filter(r => dateStatus(r.deadline) === 'due-soon' && r.stage < 4).length;
  const open = filtered.filter(r => r.stage < 4).length;
  const closed = filtered.filter(r => r.stage === 4).length;
  bar.innerHTML = `
    <div class="stat-item"><div class="stat-dot" style="background:var(--ink-muted)"></div><span class="stat-num">${filtered.length}</span><span class="stat-label">total</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--col1)"></div><span class="stat-num">${open}</span><span class="stat-label">en curso</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--accent)"></div><span class="stat-num">${overdue}</span><span class="stat-label">vencidos</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--gold)"></div><span class="stat-num">${dueSoon}</span><span class="stat-label">próx. a vencer</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--col5)"></div><span class="stat-num">${closed}</span><span class="stat-label">cerrados</span></div>
  `;
}

function renderBoard() {
  const filtered = getFiltered();
  renderStats(filtered);

  const board = document.getElementById('board');
  board.innerHTML = '';

  STAGES.forEach((stage, i) => {
    const cards = filtered.filter(r => r.stage === i);
    const col = document.createElement('div');
    col.className = `column col-${i}`;

    col.innerHTML = `
      <div class="col-header">
        <span>${stage}</span>
        <span class="col-badge">${cards.length}</span>
      </div>
      <div class="col-body" id="col-${i}">
        ${cards.length === 0 ? '<div class="empty-col">Sin requerimientos</div>' : ''}
        ${cards.map(r => renderCard(r)).join('')}
      </div>
    `;
    board.appendChild(col);
  });
}

function renderCard(r) {
  const status = dateStatus(r.deadline);
  const initials = r.responsible ? r.responsible.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
  const orgName = r.org === 'Otro' && r.org_custom ? r.org_custom : r.org;
  return `
    <div class="card ${status}" onclick="openDetail('${r.id}')">
      <div class="card-actions">
        <button class="card-btn" onclick="event.stopPropagation();openEdit('${r.id}')">✏️</button>
        <button class="card-btn danger" onclick="event.stopPropagation();deleteReq('${r.id}')">🗑</button>
      </div>
      <div class="card-org">${orgName || '—'}</div>
      <div class="card-title">${r.desc || 'Sin descripción'}</div>
      <div class="card-client">👤 ${r.client || '—'}</div>
      ${r.exp ? `<div class="card-exp">Exp: ${r.exp}</div>` : ''}
      <div class="card-footer">
        <div class="card-date ${status}">
          ${status === 'overdue' ? '⚠ ' : status === 'due-soon' ? '⏰ ' : '📅 '}
          ${formatDate(r.deadline)}
        </div>
        <div class="card-avatar" title="${r.responsible || 'Sin asignar'}">${initials}</div>
      </div>
    </div>
  `;
}

// ── MODAL ──
function openNewModal() {
  editingId = null;
  document.getElementById('modalTitleText').textContent = 'Nuevo Requerimiento';
  document.getElementById('editId').value = '';
  ['f_org','f_org_custom','f_desc','f_client','f_exp','f_responsible','f_notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_stage').value = '0';
  document.getElementById('f_received').value = toISO(new Date());
  document.getElementById('f_deadline').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(id) {
  const r = requirements.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitleText').textContent = 'Editar Requerimiento';
  document.getElementById('f_org').value = r.org || '';
  document.getElementById('f_org_custom').value = r.org_custom || '';
  document.getElementById('f_desc').value = r.desc || '';
  document.getElementById('f_client').value = r.client || '';
  document.getElementById('f_exp').value = r.exp || '';
  document.getElementById('f_received').value = r.received || '';
  document.getElementById('f_deadline').value = r.deadline || '';
  document.getElementById('f_responsible').value = r.responsible || '';
  document.getElementById('f_stage').value = r.stage || '0';
  document.getElementById('f_notes').value = r.notes || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function openDetail(id) {
  openEdit(id);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function saveRequirement() {
  const org = document.getElementById('f_org').value;
  const desc = document.getElementById('f_desc').value.trim();
  const client = document.getElementById('f_client').value.trim();
  const deadline = document.getElementById('f_deadline').value;
  const received = document.getElementById('f_received').value;

  if (!org || !desc || !client || !deadline || !received) {
    showToast('Por favor completá los campos obligatorios (*)');
    return;
  }

  const data = {
    org, desc, client,
    org_custom: document.getElementById('f_org_custom').value.trim(),
    exp: document.getElementById('f_exp').value.trim(),
    received,
    deadline,
    responsible: document.getElementById('f_responsible').value.trim(),
    stage: parseInt(document.getElementById('f_stage').value),
    notes: document.getElementById('f_notes').value.trim(),
  };

  try {
    if (editingId) {
      await updateDoc(doc(db, "requerimientos", editingId), { ...data, updated: serverTimestamp() });
      showToast('Requerimiento actualizado ✓');
    } else {
      data.created = serverTimestamp();
      await addDoc(colRef, data);
      showToast('Requerimiento creado ✓');
    }
    closeModal();
  } catch(e) {
    showToast('Error al guardar. Verificá la conexión.');
    console.error(e);
  }
}

async function deleteReq(id) {
  if (!confirm('¿Eliminar este requerimiento?')) return;
  await deleteDoc(doc(db, "requerimientos", id));
  showToast('Eliminado');
}

// ── EXPORT ──
function exportData() {
  const filtered = getFiltered();
  const headers = ['ID','Organismo','Descripción','Cliente','Expediente','Recepción','Vencimiento','Responsable','Estado','Notas'];
  const rows = filtered.map(r => {
    const org = r.org === 'Otro' && r.org_custom ? r.org_custom : r.org;
    return [r.id, org, r.desc, r.client, r.exp, r.received, r.deadline, r.responsible, STAGES[r.stage], r.notes].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `requerimientos_${toISO(new Date())}.csv`;
  a.click();
  showToast('Exportado a CSV ✓');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
updateDateDisplay();

window.openNewModal = openNewModal;
window.openEdit = openEdit;
window.openDetail = openDetail;
window.closeModal = closeModal;
window.saveRequirement = saveRequirement;
window.deleteReq = deleteReq;
window.setFilter = setFilter;
window.navDate = navDate;
window.exportData = exportData;
window.renderBoard = renderBoard;

</script>
